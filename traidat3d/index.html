<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mô hình 3D Trái Đất</title>
    <link rel="icon" type="image/png" sizes="32x32" href="https://media-cdn-v2.laodong.vn/Storage/NewsPortal/2021/5/28/914234/Trai-Dat-Vien-Bi-Xan.jpg">
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #info { position: absolute; top: 20px; width: 100%; text-align: center; z-index: 100; pointer-events: none; color: #fff; text-shadow: 0 0 10px #fff, 0 0 20px #4791e6, 0 0 40px #0080ff, 0 0 80px #ffffff; }
        h1 { margin: 0; font-size: 26px; letter-spacing: 1px; text-transform: uppercase; }
        p { margin: 8px 0 0 0; font-size: 15px; color: #ddd; font-weight: 300; }
    </style>
</head>
<body>
    <div id="info">
        <h1>Mô hình 3D Trái Đất - Hoàng Tiến Minh</h1>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 3);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.minDistance = 1.3;
        controls.maxDistance = 10;
        const earthGeometry = new THREE.SphereGeometry(1, 128, 128);
        const textureLoader = new THREE.TextureLoader();
        const earthTexture = textureLoader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_atmos_2048.jpg');
        const cloudTexture = textureLoader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_clouds_1024.png');
        const earthMaterial = new THREE.MeshBasicMaterial({ map: earthTexture });
        const earth = new THREE.Mesh(earthGeometry, earthMaterial);
        scene.add(earth);
        const cloudGeometry = new THREE.SphereGeometry(1.005, 128, 128);
        const cloudMaterial = new THREE.MeshBasicMaterial({ map: cloudTexture, transparent: true, opacity: 0.3, blending: THREE.AdditiveBlending });
        const clouds = new THREE.Mesh(cloudGeometry, cloudMaterial);
        earth.add(clouds);
        const glowGeometry = new THREE.SphereGeometry(1.045, 64, 64);
        const glowMaterial = new THREE.ShaderMaterial({
            vertexShader: `
                varying vec3 vNormal;
                void main() {
                    vNormal = normalize(normalMatrix * normal);
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                varying vec3 vNormal;
                void main() {
                    float intensity = pow(0.75 - dot(vNormal, vec3(0, 0, 1.0)), 6.0);
                    intensity *= 2.5;
                    vec3 atmosphereColor = vec3(0.0, 0.5, 1.0);
                    gl_FragColor = vec4(atmosphereColor, 1.0) * intensity;
                }
            `,
            side: THREE.BackSide,
            blending: THREE.AdditiveBlending,
            transparent: true,
            depthWrite: false
        });
        const glow = new THREE.Mesh(glowGeometry, glowMaterial);
        scene.add(glow);
        const starsGeometry = new THREE.BufferGeometry();
        const starsCount = 80000;
        const starsPositions = new Float32Array(starsCount * 3);
        const starsColors = new Float32Array(starsCount * 3);
        for(let i = 0; i < starsCount; i++) {
            const i3 = i * 3;
            starsPositions[i3] = (Math.random() - 0.5) * 200;
            starsPositions[i3 + 1] = (Math.random() - 0.5) * 200;
            starsPositions[i3 + 2] = (Math.random() - 0.5) * 200;
            const shade = (Math.random() * 0.2 + 0.6) * 1.4;
            starsColors[i3] = shade;
            starsColors[i3 + 1] = shade;
            starsColors[i3 + 2] = shade * (Math.random() * 0.2 + 0.8);
        }
        starsGeometry.setAttribute('position', new THREE.BufferAttribute(starsPositions, 3));
        starsGeometry.setAttribute('color', new THREE.BufferAttribute(starsColors, 3));

        function createCircleTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 64;
            canvas.height = 64;
            const context = canvas.getContext('2d');
            context.beginPath();
            context.arc(32, 32, 32, 0, 2 * Math.PI, false);
            context.fillStyle = 'white';
            context.fill();
            const texture = new THREE.CanvasTexture(canvas);
            return texture;
        }

        const starsMaterial = new THREE.PointsMaterial({
            size: 0.07,
            vertexColors: true,
            transparent: true,
            opacity: 1,
            map: createCircleTexture(),
            depthWrite: false,
            blending: THREE.AdditiveBlending
        });
        const starField = new THREE.Points(starsGeometry, starsMaterial);
        scene.add(starField);
        function animate() {
            requestAnimationFrame(animate);
            earth.rotation.y += 0.0006;
            clouds.rotation.y += 0.00012;
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
